<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Supra (A80) | Progress</title>
    <style>
        @font-face {
            font-family: 'Bender';
            src: url('https://onlinewebfonts.com') format('woff2');
        }
        body { 
            font-family: 'Bender', sans-serif; 
            background: #0b0c0e; 
            color: #e3e4e6; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
        }
        .container { max-width: 900px; margin: 0 auto; }
        .back-link { color: #ff3333; text-decoration: none; text-transform: uppercase; font-weight: bold; display: inline-block; margin-bottom: 30px; }
        h1 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .meta { color: #646973; text-transform: uppercase; font-size: 0.9em; margin-bottom: 40px; }
        
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .screenshot-grid img {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px;
            transition: 0.3s;
            cursor: pointer; /* Делает курсор в виде пальца при наведении */
        }
        .screenshot-grid img:hover {
            border-color: #ff3333;
            transform: scale(1.01);
        }

        /* СТИЛИ ДЛЯ ОКНА УВЕЛИЧЕНИЯ КАРТИНКИ */
        .lightbox {
            display: none; /* По умолчанию скрыто */
            position: fixed;
            z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 6, 8, 0.95);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" class="back-link">← Вернуться в гараж</a>
        <h1>Toyota Supra (A80)</h1>
        <div class="meta">Текущий статус: 65% // Скриншоты разработки</div>

        <p>Работа кипит. Полностью завершил кузовные работы, сейчас ковыряю оптику и детализирую подкапотку под 2JZ-GTE.</p>

        <div class="screenshot-grid">
            <img src="1262560_20260716145534_1.png" alt="Supra Look">
            <img src="supra_engine.png" alt="Supra Engine">
        </div>
    </div>

    <!-- Наше скрытое окно для большого просмотра -->
    <div id="lightbox" class="lightbox">
        <img id="lightbox-img" src="" alt="Большой просмотр">
    </div>

    <!-- СКРИПТ УВЕЛИЧЕНИЯ КАРТИНКИ -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const images = document.querySelectorAll('.screenshot-grid img');

        // Клик на любую картинку в сетке
        images.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src; // Берем адрес картинки
                lightbox.style.display = 'flex'; // Показываем подложку
            });
        });

        // Клик в любое место большого окна закрывает его обратно
        lightbox.addEventListener('click', () => {
            lightbox.style.display = 'none';
        });
    </script>

</body>
</html>
