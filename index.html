<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rancol.dev | NFS MW 2012 Car Mods</title>
    <style>
        /* Локальное подключение шрифта прямо из твоего репозитория */
        @font-face {
            font-family: 'Bender';
            src: url('Jovanny Lemonad - Bender-Bold.otf') format('otf'); /* Если залил .ttf, поменяй тут расширение */
            font-weight: normal;
            font-style: normal;
        }

        body { 
            font-family: 'Bender', 'Arial Black', sans-serif; 
            background-color: #0b0c0e !important; /* Принудительно задаем цвет */
            color: #e3e4e6; 
            margin: 0; 
            padding: 0;
            letter-spacing: 0.5px;
        }

        /* Навигационная панель */
        .navbar {
            background: #0f1114;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.4em;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
        }
        
        .logo span { color: #ff3333; }

        .nav-links a {
            color: #8aa0a8;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9em;
            margin-left: 20px;
            transition: 0.2s;
        }

        .nav-links a:hover { color: #fff; }

        /* Баннер */
        .hero-banner {
            position: relative;
            height: 420px;
            background-color: #141619;
            background-image: linear-gradient(to bottom, rgba(11, 12, 14, 0.4) 0%, rgba(11, 12, 14, 1) 100%), url('/background.png'); 
            background-size: cover;
            background-position: center 35%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 4em;
            margin: 0 0 10px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .hero-content p {
            font-size: 1.2em;
            color: #ddd;
            margin: 0 0 30px 0;
        }

        .btn-main {
            display: inline-block;
            background: #ff3333; 
            color: #fff;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 3px;
        }

        /* Контентная зона */
        .main-content {
            max-width: 1100px;
            margin: -40px auto 60px auto;
            position: relative;
            z-index: 3;
            padding: 0 20px;
        }

        .filter-bar {
            background: #141619; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 40px;
            border-radius: 4px;
        }

        #carSearch {
            flex: 1;
            background: #0b0c0e;
            border: 1px solid #2d3139;
            padding: 12px 15px;
            color: #fff;
            font-size: 0.9em;
            text-transform: uppercase;
            outline: none;
        }

        .badge-mock {
            background: #2d3139;
            color: #fff;
            padding: 10px 20px;
            font-size: 0.85em;
            text-transform: uppercase;
        }

        .garage-section {
            text-align: left;
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 1.2em;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            padding-left: 10px;
            border-left: 3px solid #ff3333;
        }

        .garage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .car-card {
            background: #141619;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            overflow: hidden;
        }

          .car-img-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            height: auto;
            background-size: cover;
            background-position: center;
            background-color: #1f2326;
        }
        
        /* ЕСЛИ КАРТИНКА КАРТОЧКИ — ЭТО НАША ЗАГЛУШКА, НАСИЛЬНО РАС ТЯ ГИ ВА ЕМ ЕЁ */
        .car-img-placeholder[style*="stub.png"] {
            background-size: 100% 100% !important;
        }

        .car-info { padding: 25px; text-align: left; }

        .car-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        
        .car-name span:last-child { color: #ff3333; }

        .car-meta {
            font-size: 0.8em;
            color: #646973;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .status-row {
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }
        
        .text-done { color: #52ff7a; }
        .text-process { color: #ffcc00; }
        .text-queue { color: #646973; }

        .bar-bg {
            background: #22252a;
            height: 4px;
            margin-top: 15px;
        }
        .bar-fill {
            background: linear-gradient(90deg, #ff3333 0%, #ffcc00 50%, #00ff7f 100%);
            height: 100%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>

    <!-- Шапка сайта -->
    <div class="navbar">
        <div class="logo">rancol<span>.dev</span></div>
        <div class="nav-links">
            <a href="#">Главная</a>
            <a href="https://t.me/rancol347" target="_blank">Telegram</a>
        </div>
    </div>

    <!-- БАННЕР -->
    <div class="hero-banner" style="background-image: linear-gradient(to bottom, rgba(11, 12, 14, 0.4) 0%, rgba(11, 12, 14, 1) 100%), url('/background.png');">
        <div class="hero-content">
            <h1>RANCOL.DEV</h1>
            <p>Roadmap мододела rancol'а</p>
        </div>
    </div>

    <!-- Контент -->
    <div class="main-content">
        
        <div class="filter-bar">
            <input type="text" id="carSearch" placeholder="ПОИСК ПО ГАРАЖУ..." autocomplete="off">
            <div class="badge-mock">ИГРА: NFS MW 2012</div>
        </div>

         <!-- СЕКЦИЯ 1: В ГАРАЖЕ -->
        <div class="garage-section">
            <div class="section-title">Текущие проекты</div>
            <div class="garage-grid">
                
                <!-- Супра (Прогресс менять ТОЛЬКО в data-progress) -->
                <div class="car-card searchable-card" data-name="toyota supra a80" data-progress="65">
                    <a href="/supraa80/" style="text-decoration: none; color: inherit; display: block;">
                        <div class="car-img-placeholder" style="background-image: url('/supraa80/1262560_20260716145534_1.png');"></div>
                        <div class="car-info">
                            <div class="car-name">
                                <span>Toyota Supra (A80)</span> 
                                <span class="percent-text"><!-- Сюда процент подставится сам --></span>
                            </div>
                            <div class="car-meta">Stock Edition</div>
                            <div class="status-row"><span>Кузов:</span> <span class="text-done">ГОТОВО</span></div>
                            <div class="status-row"><span>Фары:</span> <span class="text-process">В ПРОЦЕССЕ</span></div>
                            <div class="status-row"><span>Подкапотка (2JZ):</span> <span class="text-process">В ПРОЦЕССЕ</span></div>
                            <div class="bar-bg"><div class="bar-fill"></div></div>
                        </div>
                    </a>
                </div>

                <!-- БМВ М8 (Прогресс менять ТОЛЬКО в data-progress) -->
                <div class="car-card searchable-card" data-name="bmw m8 coupe f92" data-progress="0">
                        <div class="car-img-placeholder" style="background-image: url('/stub.png');"></div>
                    <div class="car-info">
                        <div class="car-name">
                            <span>BMW M8 Coupe (F92)</span> 
                            <span class="percent-text"><!-- Сюда процент подставится сам --></span>
                        </div>
                        <div class="car-meta">В планах</div>
                        <div class="status-row"><span>Геометрия:</span> <span class="text-process">В ПРОЦЕССЕ</span></div>
                        <div class="status-row"><span>Конверт в игру:</span> <span class="text-process">В ПРОЦЕССЕ</span></div>
                        <div class="bar-bg"><div class="bar-fill"></div></div>
                    </div>
                </div>

            </div>
        </div>
    </div>    
    <script>
        function initCarProgress() {
            let cards = document.querySelectorAll('.searchable-card');
            cards.forEach(function(card) {
                let progress = parseInt(card.getAttribute('data-progress')) || 0;
                let percentTextElement = card.querySelector('.percent-text');
                if (percentTextElement) {
                    percentTextElement.textContent = progress + '%';
                }
                
                let barFill = card.querySelector('.bar-fill');
                if (barFill) {
                    if (progress > 0) {
                        // Если прогресс больше нуля — считаем красивый градиент
                        barFill.style.width = progress + '%';
                        let totalWidth = 100 * (100 / progress);
                        barFill.style.backgroundSize = totalWidth + '% 100%';
                    } else {
                        // ЕСЛИ 0% — ЖЕСТКО ОБНУЛЯЕМ ПОЛОСУ, ЧТОБЫ ОНА НЕ ТОРЧАЛА
                        barFill.style.width = '0%';
                        barFill.style.backgroundSize = '100% 100%';
                    }
                }
            });
        }

        document.getElementById('carSearch').addEventListener('input', function() {
            let filter = this.value.toLowerCase().trim();
            let cards = document.querySelectorAll('.searchable-card');
            cards.forEach(function(card) {
                let carDataName = card.getAttribute('data-name').toLowerCase();
                if (carDataName.includes(filter)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        });

        initCarProgress();
    </script>
